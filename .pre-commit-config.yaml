repos:
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: 'npm run prettier'
        language: node
        files: '\.(ts|tsx|js|jsx|css)$'
      - id: eslint
        name: eslint
        entry: 'npm run eslint'
        language: node
        files: '\.(ts|tsx|js|jsx)$'
