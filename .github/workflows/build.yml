name: Build

on:
  push:
    branches: main
  pull_request:
    branches: '*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Python dependencies
      run: pip install -U "jupyterlab>=4.0.0,<5" build

    - name: Install JS dependencies
      run: npm install

    - name: Lint the extension
      run: npm run eslint:check

    - name: Build JS packages
      run: npm run build:prod

    - name: Build jupyter_blocks
      run: python -m build jupyter_blocks/

    - name: Build jupyter_tidyblocks
      run: python -m build jupyter_tidyblocks/

    - name: Upload extension packages
      uses: actions/upload-artifact@v4
      with:
        name: extension-artifacts
        path: |
          jupyter_blocks/dist/jupyter_blocks*
          jupyter_tidyblocks/dist/jupyter_tidyblocks*
        if-no-files-found: error

  test_isolated:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - uses: actions/download-artifact@v4
      with:
        name: extension-artifacts

    - name: Install and Test
      run: |
        set -eux
        # Remove NodeJS, twice to take care of system and locally installed node versions.
        sudo rm -rf $(which node)
        sudo rm -rf $(which node)

        pip install "jupyterlab>=4.0.0,<5"
        pip install --no-deps jupyter_blocks/dist/jupyter_blocks*.whl
        pip install --no-deps jupyter_tidyblocks/dist/jupyter_tidyblocks*.whl

        jupyter labextension list
        jupyter labextension list 2>&1 | grep -ie "jupyter-blocks-extension.*OK"
        jupyter labextension list 2>&1 | grep -ie "jupyter-tidyblocks-extension.*OK"
        python -m jupyterlab.browser_check --no-browser-test

  check_links:
    name: Check Links
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: jupyterlab/maintainer-tools/.github/actions/check-links@v1
